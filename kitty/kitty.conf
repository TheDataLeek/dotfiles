# kitty configuration
# Docs: https://sw.kovidgoyal.net/kitty/conf/
# Reload without restart: ctrl+shift+F5
# Debug config: kitty +runpy 'from kitty.config import *; print(load_config())'

# ── Shell ─────────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#opt-kitty.shell

shell                   /usr/bin/fish

# Shell integration enables: jump between prompts (ctrl+shift+z/x), mark output,
# clone windows with same cwd, pipe command output to editor, etc.
# https://sw.kovidgoyal.net/kitty/shell-integration/
shell_integration       enabled

# ── Fonts ─────────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#fonts
# List installed fonts: kitty +list-fonts
# List PostScript names (needed for font_features): kitty +list-fonts --psnames

font_family             Fira Code
bold_font               Fira Code Bold
italic_font             auto
bold_italic_font        auto
font_size               13.0

# font_features uses PostScript names (not family names) to enable/disable
# OpenType features per variant. +calt enables programming ligatures.
# FiraCode stylistic sets: ss01=alt-r, ss02=alt-<=, ss03=alt-&, ss04=alt-$,
# ss05=alt-@, ss06=alt-\  https://github.com/tonsky/FiraCode/wiki/OpenType-features
font_features           FiraCode-Regular  +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06
font_features           FiraCode-Bold     +calt

# never / cursor (disable at cursor position) / always
disable_ligatures       never

# ── Cursor ────────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#cursor-customization

cursor                  #e896c8
cursor_text_color       #1a1028
# block / beam / underline
cursor_shape            beam
cursor_blink_interval   0.5
# Stop blinking after N seconds of inactivity (0 = never stop)
cursor_stop_blinking_after 10.0

# ── Scrollback ────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#opt-kitty.scrollback_lines
# -1 = unlimited (uses more memory); browse with ctrl+shift+h (opens in pager)

scrollback_lines        10000

# ── Mouse ─────────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#mouse

url_color               #c9a6f5
# none / straight / double / curly / dotted / dashed
url_style               curly
open_url_with           default

# Copy highlighted text straight to clipboard (not just primary selection)
copy_on_select          clipboard

# Characters treated as part of a word on double-click — includes path separators
# so double-clicking a file path selects the whole thing
select_by_word_characters @-./_~?&=%+#

# ── Window ────────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#window

window_padding_width    12
hide_window_decorations no

# Requires a compositor (KDE: System Settings → Display → Compositor → OpenGL)
background_opacity      0.80
# Allow changing opacity at runtime with ctrl+shift+a/ctrl+shift+a m
dynamic_background_opacity yes

# Prompt before closing if there are N or more foreground processes (0 = never prompt)
confirm_os_window_close 2

remember_window_size    yes
initial_window_width    1200
initial_window_height   750

# ── Performance ───────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#performance-tuning

# Milliseconds to wait before repainting — lower = more responsive, more CPU
repaint_delay           8
# Delay before reading input (batches keypresses to reduce repaints)
input_delay             2
# Sync repaints to the monitor refresh rate to eliminate tearing
sync_to_monitor         yes

# ── Tab bar ───────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#tab-bar
# New tab: ctrl+shift+t  |  Close: ctrl+shift+q  |  Switch: ctrl+shift+→/←

# fade / slant / separator / powerline / custom / hidden
tab_bar_style           powerline
# angled / slanted / round
tab_powerline_style     slanted
tab_bar_background      #120b1e
active_tab_foreground   #1a1028
active_tab_background   #e896c8
active_tab_font_style   bold
inactive_tab_foreground #9a7ab8
inactive_tab_background #2a1b3d

# ── Layouts ───────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/layouts/
# New split: ctrl+shift+enter  |  Cycle layout: ctrl+shift+l
# Move focus: ctrl+shift+[/]   |  Resize: ctrl+shift+r then arrow keys
# Available: fat, grid, horizontal, splits, stack, tall, vertical

enabled_layouts         tall,stack,fat

# ── Bell ──────────────────────────────────────────────────────────────────────
# https://sw.kovidgoyal.net/kitty/conf/#bell

enable_audio_bell       no
visual_bell_duration    0.0

# ── Girlypop Pastel Theme ─────────────────────────────────────────────────────
# Dark plum base with pastel pink/lavender/mint/peach accents.
# To swap themes: https://github.com/kovidgoyal/kitty-themes
# Preview/install a theme interactively: kitty +kitten themes

foreground              #f0deff
background              #1a1028

selection_foreground    #f0deff
selection_background    #4a2870

# black / bright-black (used for backgrounds, comments, borders)
color0                  #2a1b3d
color8                  #5a3a7a

# red → hot pink (errors, deletions)
color1                  #ff6b9d
color9                  #ff8fb5

# green → mint (success, additions)
color2                  #9de8b0
color10                 #b8f5c8

# yellow → peach (warnings, modified)
color3                  #ffb98a
color11                 #ffd0a8

# blue → lavender (info, links)
color4                  #b8a0f5
color12                 #cebef8

# magenta → bubblegum (keywords, special)
color5                  #f5a0d0
color13                 #ffbee5

# cyan → sky blue (strings, paths)
color6                  #8de8f0
color14                 #a8f0f8

# white / bright-white (foreground text)
color7                  #d8c0f0
color15                 #f5eaff
